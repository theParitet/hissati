<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800" role="img" aria-label="Hissati plan dashboard preview">
  <!-- PLACEHOLDER — Wave 2 swaps in a real Playwright screenshot of /results. -->
  <defs>
